                            <i className="fas fa-ban mr-2"></i> Bỏ Qua
                          </>
                        ) : (
                          <>
                            <i className="fas fa-check mr-2"></i> Xác Nhận (
                            {globalActionState.targets.length})
                          </>
                        )}
                      </button>
                    </div>
                  </>
                )}
              </BottomSheet>
            )}

            {selectedPlayer && !globalActionState && (
              <BottomSheet
                isOpen={true}
                onClose={() => setSelectedPlayer(null)}
                title={players.find((p) => p.id === selectedPlayer)?.name}
                icon="fa-user"
                titleColor="text-white"
              >
                <button
                  onClick={() => togglePlayerStatusFromModal(selectedPlayer)}
                  className={`w-full py-4 rounded-xl font-bold text-lg mt-2 mb-2 flex items-center justify-center gap-3 shadow-lg ${players.find((p) => p.id === selectedPlayer).alive ? "bg-red-600 text-white" : "bg-emerald-600 text-white"}`}
                >
                  <i
                    className={`fas ${players.find((p) => p.id === selectedPlayer).alive ? "fa-skull" : "fa-heart"}`}
                  ></i>
                  {players.find((p) => p.id === selectedPlayer).alive
                    ? "ĐÁNH DẤU CHẾT"
                    : "HỒI SINH"}
                </button>
              </BottomSheet>
            )}

            <BottomSheet
              isOpen={activeModal === "history"}
              onClose={() => setActiveModal(null)}
              title="Lịch Sử Game"
              icon="fa-book"
              fullHeight={true}
            >
              <div className="flex-1 overflow-y-auto bg-slate-900 rounded p-3 pb-6">
                {gameHistory.length === 0 && (
                  <p className="text-slate-500 text-center mt-4">
                    Chưa có dữ liệu.
                  </p>
                )}
                {gameHistory.map((h) => (
                  <div
                    key={h.night}
                    className="mb-4 border-b border-slate-700 pb-2"
                  >
                    <div className="text-emerald-400 font-bold mb-1">
                      Turn {h.night}
                    </div>
                    <ul className="text-xs text-slate-300 space-y-1 ml-2">
                      {h.actionLogs.map((l) => (
                        <li key={l.id}>
                          <span className="text-blue-300">
                            {players.find((p) => p.id === l.sourceId)?.name}
                          </span>{" "}
                          dùng{" "}
                          <span className="text-orange-400">
                            {l.abilityName}
                          </span>{" "}
                          lên{" "}
                          <span className="text-purple-300">
                            {players.find((p) => p.id === l.targetId)?.name}
                          </span>
                        </li>
                      ))}
                      {h.roleLogs.map((l, i) => (
                        <li key={"r" + i}>
                          <i className="fas fa-exchange-alt text-indigo-400 mr-1"></i>
                          {players.find((p) => p.id === l.playerId)?.name}:{" "}
                          <span className="line-through">
                            {l.fromRoleId === 0
                              ? "Dân Làng"
                              : roles.find((r) => r.id === l.fromRoleId)?.name}
                          </span>{" "}
                          ➡️{" "}
                          <span className="text-indigo-300">
                            {l.toRoleId === 0
                              ? "Dân Làng"
                              : roles.find((r) => r.id === l.toRoleId)?.name}
                          </span>
                        </li>
                      ))}
                      {h.statusLogs.map((l, i) => (
                        <li
                          key={"s" + i}
                          className={
                            l.toStatus ? "text-emerald-400" : "text-red-400"
                          }
                        >
                          {players.find((p) => p.id === l.playerId)?.name}{" "}
                          {l.toStatus ? "hồi sinh" : "đã chết"}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
            </BottomSheet>

            <BottomSheet
              isOpen={activeModal === "night"}
              onClose={() => setActiveModal(null)}
              title={`Kết thúc Turn ${nightCount}?`}
              icon="fa-moon"
              titleColor="text-emerald-400"
            >
              <div className="flex gap-3 mt-4">
                <button
                  onClick={() => setActiveModal(null)}
                  className="flex-1 py-3 bg-slate-700 rounded-xl font-bold text-white"
                >
                  <i className="fas fa-times mr-2"></i> HỦY
                </button>
                <button
                  onClick={handleNextNight}
                  className="flex-1 py-3 bg-emerald-600 rounded-xl font-bold text-white"
                >
                  <i className="fas fa-check mr-2"></i> QUA ĐÊM
                </button>
              </div>
            </BottomSheet>

            <BottomSheet
              isOpen={activeModal === "reset"}
              onClose={() => setActiveModal(null)}
              title="Cảnh báo Reset"
              icon="fa-exclamation-triangle"
              titleColor="text-red-500"
            >
              <p className="text-sm text-slate-400 mb-6 text-center">
                Trò chơi sẽ bị reset lại từ đầu (xoá toàn bộ Role, Lịch sử). Chỉ
                giữ lại tên người chơi.
              </p>
              <div className="flex gap-3">
                <button
                  onClick={() => setActiveModal(null)}
                  className="flex-1 py-3 bg-slate-700 rounded-xl font-bold text-white"
                >
                  <i className="fas fa-times mr-2"></i> Hủy
                </button>
                <button
                  onClick={resetGame}
                  className="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-bold text-white"
                >
                  <i className="fas fa-check mr-2"></i> Đồng ý
                </button>
              </div>
            </BottomSheet>

            <BottomSheet
              isOpen={activeModal === "settings"}
              onClose={() => setActiveModal(null)}
              title="Cài Đặt Game"
              icon="fa-cog"
            >
              <div className="mb-6 bg-slate-900 p-3 rounded-xl border border-slate-700 mt-2">
                <label className="block text-slate-300 mb-2 font-bold text-sm">
                  Chế độ hiển thị thẻ bài:
                </label>
                <select
                  value={cardViewMode}
                  onChange={(e) => setCardViewMode(e.target.value)}
                  className="w-full bg-slate-700 text-white p-2 rounded outline-none font-bold text-sm"
                >
                  <option value="nameFirst">
                    Mặc định (Lật thẻ - Tên trước)
                  </option>
                  <option value="roleFirst">
                    Xem lén (Lật thẻ - Role trước)
                  </option>
                  <option value="both">Hiện tất cả (Không cần lật)</option>
                </select>
              </div>
              <div className="mb-6">
                <label className="block text-slate-400 mb-2 font-bold text-xs">
                  Tranh Luận:{" "}
                  <span className="text-orange-400">
                    {timerSettings.debate}s
                  </span>
                </label>
                <input
                  type="range"
                  min="10"
                  max="300"
                  step="10"
                  value={timerSettings.debate}
                  onChange={(e) =>
                    setTimerSettings({
                      ...timerSettings,
                      debate: parseInt(e.target.value),
                    })
                  }
                  className="w-full h-2 bg-slate-700 rounded-lg appearance-none accent-orange-500"
                />
              </div>
              <div className="mb-6">
                <label className="block text-slate-400 mb-2 font-bold text-xs">
                  Phán Quyết:{" "}
                  <span className="text-red-400">
                    {timerSettings.judgment}s
                  </span>
                </label>
                <input
                  type="range"
                  min="10"
                  max="120"
                  step="5"
                  value={timerSettings.judgment}
                  onChange={(e) =>
                    setTimerSettings({
                      ...timerSettings,
                      judgment: parseInt(e.target.value),
                    })
                  }
                  className="w-full h-2 bg-slate-700 rounded-lg appearance-none accent-red-500"
                />
              </div>
              <button
                onClick={() => setActiveModal("reset")}
                className="w-full py-3 border border-red-500 text-red-500 hover:bg-red-500/10 rounded-xl font-bold mt-4"
              >
                <i className="fas fa-power-off mr-2"></i> KẾT THÚC GAME
              </button>
            </BottomSheet>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <ErrorBoundary>
          <App />
        </ErrorBoundary>,
      );
    </script>
  </body>
</html>
